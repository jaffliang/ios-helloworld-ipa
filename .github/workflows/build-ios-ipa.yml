name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Capacitor plugins
        run: npm ls @capacitor/haptics @capacitor/device @capacitor/network @capacitor/local-notifications @capacitor/clipboard @capacitor/camera @capacitor-mlkit/barcode-scanning

      - name: Ensure iOS platform exists
        run: |
          if [ -d "ios/App" ]; then
            echo "iOS platform already exists, skip adding."
          else
            npx cap add ios
          fi

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Apply app icon from web assets
        run: |
          ICON_SRC="www/assets/app-icon.png"
          ICON_DST="ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png"

          if [ ! -f "$ICON_SRC" ]; then
            echo "Missing icon source: $ICON_SRC"
            exit 1
          fi

          cp "$ICON_SRC" "$ICON_DST"
          echo "Applied iOS app icon: $ICON_SRC -> $ICON_DST"

      - name: Inject iOS privacy usage descriptions
        run: |
          PLIST="ios/App/App/Info.plist"

          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription This app uses the camera to take photos and scan QR codes." "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string This app uses the camera to take photos and scan QR codes." "$PLIST"

          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription This app can access photos when you choose images from your library." "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string This app can access photos when you choose images from your library." "$PLIST"

          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription This app can save captured photos to your photo library." "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string This app can save captured photos to your photo library." "$PLIST"

      - name: Build unsigned IPA
        run: |
          cd ios/App
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          cd ios/App/build/Build/Products/Release-iphoneos
          mkdir Payload
          cp -r App.app Payload/
          zip -r HelloWorld.ipa Payload

      - name: Extract version info
        id: version
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          TAG_NAME="ios-$(date +%Y%m%d-%H%M%S)"
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT

      - name: Generate release changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --list 'ios-*' --sort=-creatordate | head -n 1)

          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --no-merges --first-parent --pretty=format:'- %s (%h)')
          else
            CHANGELOG=$(git log -n 20 --no-merges --first-parent --pretty=format:'- %s (%h)')
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- No code changes detected."
          fi

          {
            echo "previous_tag=$PREV_TAG"
            echo "changes<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release and Upload IPA
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: iOS Unsigned IPA ${{ steps.version.outputs.tag }}
          body: |
            ## 无签名 iOS IPA（适用于巨魔设备）

            ### 应用信息
            - **应用名称**: HelloWorldiOS
            - **Bundle ID**: com.jaffliang.helloworld
            - **版本**: ${{ steps.version.outputs.version }}
            - **构建时间 (UTC)**: ${{ steps.version.outputs.build_time }}

            ### 注意事项
            - 此 IPA 为**未签名版本**，需通过巨魔商店或其他工具签名后安装
            - 最低支持 iOS 14.0+

            ### 下载
            点击下方的 `HelloWorld.ipa` 文件下载

            ### 本次变更说明
            ${{ steps.changelog.outputs.changes }}
          files: ios/App/build/Build/Products/Release-iphoneos/HelloWorld.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload IPA artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: ios/App/build/Build/Products/Release-iphoneos/HelloWorld.ipa
          retention-days: 30
